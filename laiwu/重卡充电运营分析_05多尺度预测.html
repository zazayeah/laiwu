<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多尺度预测功能原型</title>
  <link rel="stylesheet" href="重卡充电运营分析_共享样式.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <section class="brand-panel">
        <div class="eyebrow">Function Page 05</div>
        <h1>超短期 + 中长期预测</h1>
        <p class="subtitle">本页对应规范书中的“超短期 + 中长期预测”功能，演示 4 小时、24 小时和月度趋势三类预测结果与输入因子。</p>
        <nav class="site-nav" id="pageNav"></nav>
      </section>
      <section class="scenario-panel">
        <div class="scenario-head">
          <div>
            <h2 class="scenario-title" id="scenarioTitle">模拟场景</h2>
            <div class="scenario-note" id="scenarioNote">模拟数据说明</div>
          </div>
          <div class="scenario-switch" id="scenarioSwitch"></div>
        </div>
        <div class="meta-grid" id="metaGrid"></div>
      </section>
    </header>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h3 class="panel-title">预测尺度切换</h3>
          <div class="panel-desc">页面支持未来 4 小时、未来 24 小时和月度趋势三种结果视图，体现规范书要求的多时间层级预测能力。</div>
        </div>
        <div class="legend" id="forecastLegend"></div>
      </div>
      <div class="panel-body">
        <div class="pill-row" id="horizonSwitch"></div>
        <div class="two-col">
          <div class="card-grid">
            <div class="stat-grid" id="forecastStats"></div>
            <div class="chip-row" id="inputFactors"></div>
          </div>
          <div class="chart-shell">
            <svg id="forecastScaleChart" viewBox="0 0 920 360" aria-label="预测尺度折线图"></svg>
          </div>
        </div>
        <div class="chart-notes" id="forecastNotes"></div>
      </div>
    </section>

    <section class="panel" style="margin-top:18px;">
      <div class="panel-head">
        <div>
          <h3 class="panel-title">预测结果明细</h3>
          <div class="panel-desc">可用于区域级、重点站点级预测结果展示，也可扩展为报表和接口输出。</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="table-grid" id="forecastTable"></div>
      </div>
    </section>
  </div>

  <script src="重卡充电运营分析_共享数据.js"></script>
  <script>
    const App = window.HeavyTruckDashboard;
    const state = { horizon: "24h" };

    function numericFromDisplay(value) {
      return parseFloat(String(value).replace(/[^\d.]/g, "")) || 0;
    }

    function getForecastView(scenario) {
      if (state.horizon === "4h") {
        const start = 12;
        const labels = Array.from({ length: 4 }, (_, index) => `${String(start + index).padStart(2, "0")}:00`);
        const primary = scenario.forecastLoad.slice(start, start + 4);
        const secondary = scenario.actualLoad.slice(start, start + 4);
        return {
          stats: [
            { label: "未来4小时峰值", value: `${Math.max(...primary).toFixed(1)} MW` },
            { label: "平均预测值", value: `${App.avgSlice(primary, 0, primary.length).toFixed(1)} MW` },
            { label: "滚动置信度", value: "90%-94%" }
          ],
          factors: ["实时负荷", "天气", "日期类型", "分时电价", "近期订单行为"],
          rows: primary.map((value, index) => ({
            time: labels[index],
            value: `${value.toFixed(1)} MW`,
            hint: index >= 2 ? "价差信号加强" : "平稳过渡",
            conf: `${90 - index * 2}%`
          })),
          chart: {
            labels,
            primary,
            secondary,
            primaryName: "滚动预测",
            secondaryName: "历史基线",
            notes: [
              { title: "短时滚动", text: "更强调近期负荷、价格信号和天气变化对未来几小时的影响。" },
              { title: "快速预警", text: "适合识别临近峰值、策略触发点和站点并发抬升风险。" },
              { title: "结果用途", text: "支撑未来数小时监测、站点调度和短时运营引导。" }
            ]
          }
        };
      }

      if (state.horizon === "24h") {
        return {
          stats: [
            { label: "24小时峰值", value: `${Math.max(...scenario.forecastLoad).toFixed(1)} MW` },
            { label: "24小时谷值", value: `${Math.min(...scenario.forecastLoad).toFixed(1)} MW` },
            { label: "滚动误差目标", value: "MAPE < 8%" }
          ],
          factors: ["实时负荷", "天气", "日期类型", "分时电价", "用户群体结构", "站点容量边界"],
          rows: scenario.forecastLoad.map((value, index) => ({
            time: `${String(index).padStart(2, "0")}:00`,
            value: `${value.toFixed(1)} MW`,
            hint: index >= 18 && index <= 21 ? "重点峰段" : index >= 11 && index <= 14 ? "可引导窗口" : "常规监测",
            conf: `${(92 - Math.abs(12 - index) * 0.6).toFixed(0)}%`
          })).filter((_, index) => index % 4 === 0 || index === 19),
          chart: {
            labels: scenario.forecastLoad.map((_, index) => `${String(index).padStart(2, "0")}:00`),
            primary: scenario.forecastLoad,
            secondary: scenario.actualLoad,
            primaryName: "24小时预测",
            secondaryName: "当日实际",
            notes: [
              { title: "全日趋势", text: "适合同时识别峰值时段、谷段窗口和全天负荷走势变化。" },
              { title: "输入维度", text: "除实时负荷外，还会融合天气、日期、电价和用户结构特征。" },
              { title: "结果用途", text: "支撑区域级与重点站点级 24 小时运行研判和预警分析。" }
            ]
          }
        };
      }

      const monthlyPrimary = scenario.monthlyTrend.map((item) => numericFromDisplay(item.value));
      const monthlySecondary = monthlyPrimary.map((value, index) => Number((value * (0.94 + index * 0.015)).toFixed(1)));
      return {
        stats: [
          { label: "月度增长趋势", value: "+4.1%" },
          { label: "重点区域增量", value: "莱芜南部优先" },
          { label: "支撑场景", value: "规划与资源配置" }
        ],
        factors: ["车辆增长趋势", "区域推广政策", "站点建设节奏", "历史月度负荷", "空间分布变化"],
        rows: scenario.monthlyTrend.map((item) => ({
          time: item.time,
          value: item.value,
          hint: item.hint,
          conf: item.conf
        })),
        chart: {
          labels: scenario.monthlyTrend.map((item) => item.time),
          primary: monthlyPrimary,
          secondary: monthlySecondary,
          primaryName: "月度预测",
          secondaryName: "趋势基线",
          notes: [
            { title: "趋势判断", text: "更适合看月度增长和空间分布变化，不强调分钟级波动。" },
            { title: "输入维度", text: "重点融合政策推广、车辆增长、站点建设节奏和历史月度负荷。" },
            { title: "结果用途", text: "支撑资源配置、规划分析和重点区域发展预判。" }
          ]
        }
      };
    }

    function renderForecastScaleChart(svg, chart) {
      const width = 920;
      const height = 360;
      const padding = { top: 24, right: 20, bottom: 52, left: 48 };
      const innerWidth = width - padding.left - padding.right;
      const innerHeight = height - padding.top - padding.bottom;
      const yMax = Math.max(...chart.primary, ...chart.secondary) * 1.18;
      const count = chart.labels.length;
      const xStep = count > 1 ? innerWidth / (count - 1) : innerWidth;
      const x = (index) => padding.left + index * xStep;
      const y = (value) => padding.top + innerHeight - (value / yMax) * innerHeight;
      const pathFor = (arr) => arr.map((value, index) => `${index === 0 ? "M" : "L"} ${x(index).toFixed(2)} ${y(value).toFixed(2)}`).join(" ");

      const primaryPath = pathFor(chart.primary);
      const secondaryPath = pathFor(chart.secondary);
      const primaryArea = `${primaryPath} L ${x(count - 1).toFixed(2)} ${padding.top + innerHeight} L ${x(0).toFixed(2)} ${padding.top + innerHeight} Z`;

      const grid = [0, 0.25, 0.5, 0.75, 1].map((step) => {
        const value = yMax * step;
        const lineY = y(value);
        return `
          <line x1="${padding.left}" y1="${lineY}" x2="${width - padding.right}" y2="${lineY}" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4 8"></line>
          <text x="${padding.left - 12}" y="${lineY + 5}" text-anchor="end" fill="rgba(237,244,239,0.55)" font-size="11">${value.toFixed(1)}</text>
        `;
      }).join("");

      const labels = chart.labels.map((label, index) => {
        const shouldShow = count <= 6 || index % Math.ceil(count / 6) === 0 || index === count - 1;
        if (!shouldShow) return "";
        return `<text x="${x(index)}" y="${height - 16}" text-anchor="middle" fill="rgba(237,244,239,0.55)" font-size="11">${label}</text>`;
      }).join("");

      const primaryDots = chart.primary.map((value, index) => `<circle cx="${x(index)}" cy="${y(value)}" r="3.4" fill="#b9e769"></circle>`).join("");
      const secondaryDots = chart.secondary.map((value, index) => `<circle cx="${x(index)}" cy="${y(value)}" r="2.8" fill="#68d6c9"></circle>`).join("");

      svg.innerHTML = `
        <defs>
          <linearGradient id="forecastAreaFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(185,231,105,0.24)"></stop>
            <stop offset="100%" stop-color="rgba(185,231,105,0.02)"></stop>
          </linearGradient>
          <filter id="forecastGlow">
            <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
            <feMerge>
              <feMergeNode in="blur"></feMergeNode>
              <feMergeNode in="SourceGraphic"></feMergeNode>
            </feMerge>
          </filter>
        </defs>
        <rect x="0" y="0" width="${width}" height="${height}" rx="20" fill="rgba(255,255,255,0.01)"></rect>
        ${grid}
        <path d="${primaryArea}" fill="url(#forecastAreaFill)"></path>
        <path d="${secondaryPath}" fill="none" stroke="#68d6c9" stroke-width="2.6" stroke-dasharray="5 6"></path>
        <path d="${primaryPath}" fill="none" stroke="#b9e769" stroke-width="3.4" filter="url(#forecastGlow)"></path>
        ${primaryDots}
        ${secondaryDots}
        ${labels}
      `;
    }

    function renderPage(key) {
      const scenario = App.getScenario(key);
      document.getElementById("scenarioTitle").textContent = scenario.title;
      document.getElementById("scenarioNote").textContent = scenario.note;
      App.renderMeta(document.getElementById("metaGrid"), scenario);

      document.getElementById("horizonSwitch").innerHTML = `
        <button class="pill-btn ${state.horizon === "4h" ? "active" : ""}" data-horizon="4h">未来 4 小时</button>
        <button class="pill-btn ${state.horizon === "24h" ? "active" : ""}" data-horizon="24h">未来 24 小时</button>
        <button class="pill-btn ${state.horizon === "month" ? "active" : ""}" data-horizon="month">月度趋势</button>
      `;

      const view = getForecastView(scenario);

      document.getElementById("forecastStats").innerHTML = view.stats.map((item) => `
        <div class="summary-card"><div class="label">${item.label}</div><div class="value">${item.value}</div></div>
      `).join("");
      document.getElementById("inputFactors").innerHTML = view.factors.map((item) => `<span class="chip">${item}</span>`).join("");
      document.getElementById("forecastLegend").innerHTML = `
        <span><i style="background:#b9e769;"></i>${view.chart.primaryName}</span>
        <span><i style="background:#68d6c9;"></i>${view.chart.secondaryName}</span>
      `;
      document.getElementById("forecastNotes").innerHTML = view.chart.notes.map((item) => `
        <div class="summary-card">
          <div class="label">${item.title}</div>
          <div class="desc">${item.text}</div>
        </div>
      `).join("");
      renderForecastScaleChart(document.getElementById("forecastScaleChart"), view.chart);
      document.getElementById("forecastTable").innerHTML = `
        <div class="table-row header"><span>时间</span><span>预测值</span><span>结果解读</span><span>置信度</span></div>
        ${view.rows.map((item) => `
          <div class="table-row">
            <strong>${item.time}</strong>
            <span>${item.value}</span>
            <span>${item.hint}</span>
            <span>${item.conf}</span>
          </div>
        `).join("")}
      `;
    }

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-horizon]");
      if (!button) return;
      state.horizon = button.dataset.horizon;
      renderPage(App.getScenarioKey());
    });

    App.renderPageLinks(document.getElementById("pageNav"), "重卡充电运营分析_05多尺度预测.html");
    App.renderScenarioSwitch(document.getElementById("scenarioSwitch"), renderPage);
    renderPage(App.getScenarioKey());
  </script>
</body>
</html>
